<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Aula · Doc 3V — Aprende Guitarra</title>
<meta name="description" content="El aula de Doc 3V: accede a tu curso de guitarra, sigue tu progreso y practica cada día.">
<meta name="theme-color" content="#0A0A0C">
<link rel="icon" href="assets/img/logo.png">
<link rel="stylesheet" href="assets/styles.css">
<link rel="stylesheet" href="assets/aula.css">
<link rel="stylesheet" href="assets/bot.css">
</head>
<body class="app-body-root">

<!-- Red de seguridad: si el aula no logra arrancar (error de JS, webview restrictivo),
     esto aparece en vez de una pantalla negra. aula.js lo oculta al arrancar bien. -->
<div id="bootSafe" hidden style="min-height:100svh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center">
  <div style="max-width:340px">
    <p style="font-size:17px;font-weight:700;margin-bottom:8px">El aula tardó en cargar.</p>
    <p style="font-size:14px;opacity:.75;margin-bottom:18px">Suele resolverse recargando. Si estás dentro de Instagram, ábrelo mejor en tu navegador (⋯ → Abrir en Chrome/Safari).</p>
    <p><a href="aula.html?via=acceso" style="display:inline-block;padding:12px 18px;border:1px solid currentColor;border-radius:10px;text-decoration:none;color:inherit;font-weight:700">Recargar el aula</a></p>
    <p style="margin-top:10px"><a href="index.html" style="color:inherit;opacity:.7">← Volver al sitio</a></p>
  </div>
</div>
<noscript>
  <div style="min-height:60vh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center">
    <p>El aula necesita JavaScript activado. <a href="index.html" style="color:inherit">← Volver al sitio</a></p>
  </div>
</noscript>
<script>
  window.__aulaBootFail = function () { var s = document.getElementById('bootSafe'); if (s) s.hidden = false; };
  setTimeout(function () {
    var app = document.getElementById('app');
    if (app && app.hidden) window.__aulaBootFail();
  }, 5000);
</script>

<!-- ============ LA APP (detrás del portón: acceso.html) ============ -->
<div id="app" hidden>
  <header class="app-bar">
    <div class="app-bar-in">
      <a class="brand app-brand" href="#/" aria-label="Aula Doc 3V, inicio">
        <img src="assets/img/logo.png" alt="" width="30" height="30"> Doc 3V
        <span class="brand-tag">Aula</span>
      </a>

      <div class="app-progress" id="barTop" title="Tu avance en el curso">
        <div class="ap-track"><i id="apFill"></i></div>
        <span id="apPct">0%</span>
      </div>

      <div class="app-user">
        <span class="au-streak" id="streakPill" title="Días seguidos practicando">🔥 <b id="streakN">0</b></span>
        <div class="au-menu">
          <button type="button" class="au-btn" id="userBtn" aria-haspopup="true" aria-expanded="false">
            <span class="au-av" id="userAv">A</span>
            <span class="au-name" id="userName">Alumno</span>
            <span aria-hidden="true">▾</span>
          </button>
          <div class="au-drop" id="userDrop" hidden>
            <a href="index.html" target="_blank" rel="noopener">Ver el sitio</a>
            <button type="button" id="resetBtn">Reiniciar mi progreso</button>
            <button type="button" id="logoutBtn">Cerrar sesión</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="app-shell">
    <!-- NAVEGACIÓN DEL CURSO -->
    <aside class="app-nav" id="nav" aria-label="Contenido del curso"></aside>

    <!-- VISTA (dashboard o lección) -->
    <main class="app-view" id="view" tabindex="-1"></main>
  </div>
</div>

<script src="assets/bot.js" defer></script>
<script src="assets/aula.js" defer></script>
</body>
</html>
