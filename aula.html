<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Aula · Doc 3V — Aprende Guitarra</title>
<meta name="description" content="El aula de Doc 3V: accede a tu curso de guitarra, sigue tu progreso y practica cada día.">
<meta name="theme-color" content="#0A0A0C">
<link rel="icon" href="assets/img/logo.png">
<link rel="stylesheet" href="assets/styles.css">
<link rel="stylesheet" href="assets/aula.css">
</head>
<body class="app-body-root">

<!-- ============ PUERTA DE ACCESO (aquí aterriza el que pagó) ============ -->
<div id="gate" class="gate" hidden>
  <div class="gate-card">
    <a class="gate-brand" href="index.html"><img src="assets/img/logo.png" alt="" width="34" height="34"> Doc 3V</a>
    <h1 class="gate-h">Entra a tu aula</h1>
    <p class="gate-sub">El espacio de tus alumnos: aquí está tu curso, tu progreso y tu práctica del día.</p>

    <form id="loginForm" class="gate-form" autocomplete="on" novalidate>
      <label class="fld">
        <span>Correo</span>
        <input id="email" type="email" name="email" inputmode="email" placeholder="tu@correo.com" required>
      </label>
      <label class="fld">
        <span>Código de acceso</span>
        <input id="code" type="text" name="code" placeholder="El que te llegó al comprar" required>
      </label>
      <p id="gateErr" class="gate-err" hidden></p>
      <button class="btn btn-gold" type="submit">Entrar</button>
    </form>

    <div class="gate-alt">
      <button id="demoEnter" type="button" class="btn btn-line btn-sm">Entrar en modo demostración</button>
      <p class="gate-note">¿Aún no tienes el curso? <a href="index.html#precio">Verlo aquí →</a></p>
    </div>

    <p class="gate-foot">
      <span class="lock">🔒</span> Prototipo del aula. Aquí es donde, con el pago conectado,
      el alumno entra automáticamente después de comprar.
    </p>
  </div>
</div>

<!-- ============ LA APP ============ -->
<div id="app" hidden>
  <header class="app-bar">
    <div class="app-bar-in">
      <a class="brand app-brand" href="#/" aria-label="Aula Doc 3V, inicio">
        <img src="assets/img/logo.png" alt="" width="30" height="30"> Doc 3V
        <span class="brand-tag">Aula</span>
      </a>

      <div class="app-progress" id="barTop" title="Tu avance en el curso">
        <div class="ap-track"><i id="apFill"></i></div>
        <span id="apPct">0%</span>
      </div>

      <div class="app-user">
        <span class="au-streak" id="streakPill" title="Días seguidos practicando">🔥 <b id="streakN">0</b></span>
        <div class="au-menu">
          <button type="button" class="au-btn" id="userBtn" aria-haspopup="true" aria-expanded="false">
            <span class="au-av" id="userAv">A</span>
            <span class="au-name" id="userName">Alumno</span>
            <span aria-hidden="true">▾</span>
          </button>
          <div class="au-drop" id="userDrop" hidden>
            <a href="index.html" target="_blank" rel="noopener">Ver el sitio</a>
            <button type="button" id="resetBtn">Reiniciar mi progreso</button>
            <button type="button" id="logoutBtn">Cerrar sesión</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="app-shell">
    <!-- NAVEGACIÓN DEL CURSO -->
    <aside class="app-nav" id="nav" aria-label="Contenido del curso"></aside>

    <!-- VISTA (dashboard o lección) -->
    <main class="app-view" id="view" tabindex="-1"></main>
  </div>
</div>

<script src="assets/aula.js" defer></script>
</body>
</html>
